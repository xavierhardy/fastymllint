extends: default
rules:
  quoted-strings:
    quote-type: double
    required: true
  braces:
    min-spaces-inside: 1
    max-spaces-inside: 1
  brackets:
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0
  commas:
    max-spaces-before: 0
    min-spaces-after: 1
    max-spaces-after: 1
  line-length:
    max: 60
    allow-non-breakable-inline-mappings: true
